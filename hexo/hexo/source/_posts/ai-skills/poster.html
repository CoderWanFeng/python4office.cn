<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI办公Skill实战课 - 课程海报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .poster {
            width: 800px;
            height: 1200px;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }
        
        /* 背景装饰 */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 20% 30%, #3b82f6 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #06b6d4 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #8b5cf6 0%, transparent 40%);
        }
        
        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        /* 顶部装饰 */
        .top-glow {
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(59, 130, 246, 0.4) 0%, transparent 70%);
            filter: blur(60px);
        }
        
        /* 内容区域 */
        .content {
            position: relative;
            z-index: 10;
            padding: 60px 50px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* 标签 */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            color: #60a5fa;
            margin-bottom: 30px;
            align-self: flex-start;
        }
        
        .badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #22d3ee;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 主标题 */
        .main-title {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #60a5fa 50%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }
        
        /* 副标题 */
        .subtitle {
            font-size: 28px;
            color: #94a3b8;
            margin-bottom: 50px;
            font-weight: 400;
        }
        
        .subtitle strong {
            color: #22d3ee;
            font-weight: 600;
        }
        
        /* 技能卡片区域 */
        .skills-section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .skill-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }
        
        .skill-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }
        
        .skill-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .skill-icon.excel { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .skill-icon.pdf { background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%); }
        .skill-icon.ocr { background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%); }
        .skill-icon.report { background: linear-gradient(135deg, #ea580c 0%, #f97316 100%); }
        
        .skill-info h3 {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .skill-info p {
            color: #94a3b8;
            font-size: 14px;
        }
        
        /* 平台区域 */
        .platforms-section {
            margin-bottom: 40px;
        }
        
        .platforms {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .platform-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* 底部区域 */
        .bottom-section {
            margin-top: auto;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 30px;
        }
        
        .instructor {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 3px solid rgba(255,255,255,0.1);
        }
        
        .instructor-info h4 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .instructor-info p {
            color: #64748b;
            font-size: 14px;
        }
        
        /* 二维码区域 */
        .qr-section {
            text-align: center;
        }
        
        .qr-placeholder {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .qr-placeholder::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            background: 
                repeating-linear-gradient(0deg, #000 0px, #000 3px, transparent 3px, transparent 6px),
                repeating-linear-gradient(90deg, #000 0px, #000 3px, transparent 3px, transparent 6px);
            background-size: 6px 6px;
            opacity: 0.8;
        }
        
        .qr-section p {
            color: #94a3b8;
            font-size: 12px;
        }
        
        /* 装饰元素 */
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
        }
        
        .shape-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            right: -100px;
            filter: blur(40px);
        }
        
        .shape-2 {
            width: 200px;
            height: 200px;
            bottom: 20%;
            left: -50px;
            background: rgba(6, 182, 212, 0.1);
            filter: blur(30px);
        }
        
        /* 课程统计 */
        .stats {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #22d3ee;
            line-height: 1;
        }
        
        .stat-label {
            font-size: 14px;
            color: #64748b;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="bg-pattern"></div>
        <div class="grid-lines"></div>
        <div class="top-glow"></div>
        
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
        
        <div class="content">
            <!-- 标签 -->
            <div class="badge">全新课程体系</div>
            
            <!-- 主标题 -->
            <h1 class="main-title">AI办公<br>Skill实战课</h1>
            
            <!-- 副标题 -->
            <p class="subtitle">装一个 <strong>Skill</strong>，搞定一件 <strong>麻烦事</strong></p>
            
            <!-- 统计数据 -->
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">8</div>
                    <div class="stat-label">精品课程</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">4</div>
                    <div class="stat-label">核心技能</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">3</div>
                    <div class="stat-label">主流平台</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">0</div>
                    <div class="stat-label">代码基础</div>
                </div>
            </div>
            
            <!-- 技能卡片 -->
            <div class="skills-section">
                <p class="section-title">核心技能</p>
                <div class="skills-grid">
                    <div class="skill-card">
                        <div class="skill-icon excel">📊</div>
                        <div class="skill-info">
                            <h3>Excel 批量处理</h3>
                            <p>合并、拆分、数据分析</p>
                        </div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-icon pdf">📄</div>
                        <div class="skill-info">
                            <h3>PDF 智能处理</h3>
                            <p>合并、拆分、格式转换</p>
                        </div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-icon ocr">📷</div>
                        <div class="skill-info">
                            <h3>发票 OCR 识别</h3>
                            <p>自动提取、智能归档</p>
                        </div>
                    </div>
                    <div class="skill-card">
                        <div class="skill-icon report">📈</div>
                        <div class="skill-info">
                            <h3>日报自动生成</h3>
                            <p>数据汇总、一键成文</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 平台支持 -->
            <div class="platforms-section">
                <p class="section-title">支持平台</p>
                <div class="platforms">
                    <span class="platform-tag">🤖 Coze 扣子</span>
                    <span class="platform-tag">🦅 OpenClaw</span>
                    <span class="platform-tag">💼 飞书 CLI</span>
                </div>
            </div>
            
            <!-- 底部 -->
            <div class="bottom-section">
                <div class="instructor">
                    <div class="avatar">👨‍💻</div>
                    <div class="instructor-info">
                        <h4>程序员晚枫</h4>
                        <p>Python-office 作者 · AI办公布道者</p>
                    </div>
                </div>
                
                <div class="qr-section">
                    <img src="https://raw.atomgit.com/user-images/assets/5027920/643070fe-42e2-48ab-933d-148e85f059e4/527bb1299e6e9c65811d7ce15ebeb284.png" alt="扫码加入" style="width: 120px; height: 120px; border-radius: 12px; object-fit: cover;">
                    <p>扫码加入学习群</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
