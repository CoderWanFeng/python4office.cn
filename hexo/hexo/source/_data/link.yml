# =============================================================================
# 友情链接数据文件 (Friend Links Data)
# =============================================================================
# 渲染方式: Butterfly 主题的 flink 模板
# 页面入口: source/links/index.md  (type: link)
# 修改后无需重启, hexo g 即可生效
#
# -----------------------------------------------------------------------------
# 如何添加一个友情链接
# -----------------------------------------------------------------------------
# 1. 在对应分类(class_name)下追加一段:
#      - name: 站点名称
#        link: https://example.com
#        avatar: https://example.com/logo.png     # 头像/Logo URL, 没有就留空字符串 ""
#        descr: 一句话描述
#
# 2. 如果现有分类不合适, 直接复制一个 class_name + link_list 块, 改名字即可
#    (例如新增 "AI 工具"、"个人站点" 分类)
#
# 3. 字段说明:
#    - name    : 必填, 显示在卡片上的站点名
#    - link    : 必填, 跳转地址
#    - avatar  : 选填, 站点头像/Logo; 留空时使用主题默认占位图
#    - descr   : 选填, 鼠标悬停时显示的描述
#
# 4. 排序: 同分类内按书写顺序展示, 想置顶就放最上面
# =============================================================================

