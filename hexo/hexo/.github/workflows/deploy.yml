name: Build and Deploy to Tencent COS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hexo/hexo/package-lock.json

      - name: Install dependencies
        run: |
          cd hexo/hexo
          npm ci

      - name: Build hexo site
        run: |
          cd hexo/hexo
          hexo clean
          hexo generate

      - name: Upload to Tencent COS
        env:
          SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          cd hexo/hexo
          node scripts/upload-cos.js
