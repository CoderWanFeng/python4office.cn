# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 程序员晚枫 - Python自动化办公与AI编程
subtitle: '专注Python自动化办公、AI编程技术分享'
description: '程序员晚枫的个人网站，专注于Python自动化办公、AI编程技术分享，提供python-office库使用教程和自动化办公解决方案。'
keywords: 程序员晚枫, python-office, 自动化办公, AI编程, Python自动化, 办公自动化
author: 程序员晚枫 微信：python-office - All rights reserved
language: zh-CN
timezone: ''

# URL
## If your site is put in a subdirectory, set url as 'http://example.com/child' and root as '/child/'
url: https://www.python4office.cn/
root: /
#root: /hexo
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - '**/README.md'
  - '**/*.yml'
  - '**/*.json'

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
marked:
  prependRoot: true
  postAsset: true
  # 优化渲染器配置
  gfm: true
  pedantic: false
  breaks: true
  sanitize: false
  smartLists: true
  smartypants: false
relative_link: false
future: true

# 修复：禁用大小写敏感的文件名
permalinks:
  lowercase: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 100
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:
  AI: ai
  ChatGPT: chatgpt
  GPT: gpt
  PDF: pdf
  Pandas: pandas
  Python: python
  Unicode: unicode

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 100
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
# theme: icarus
theme: yilia
# theme: butterfly
# theme: replica
#theme: next

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: ''

# sitemap:  # 临时禁用以加速构建
#   path: sitemap.xml
# baidusitemap:
#   path: baidusitemap.xml

jsonContent:
  meta: false
  pages: false
  posts:
    title: true
    date: true
    path: true
    text: false
    raw: false
    content: false
    slug: false
    updated: false
    comments: false
    link: false
    permalink: false
    excerpt: false
    categories: false
    tags: true

# ==================== 静态文件压缩优化 ====================
# 日常构建关闭压缩以加速，需要时改回 true 即可（发版/大更新）
html_minifier:
  enable: false
  exclude:
    - '**/tags/**/*.html'
    - '**/archives/**/*.html'
    - '**/page/**/*.html'
  collapseWhitespace: true
  removeComments: true
  removeEmptyAttributes: true
  removeScriptTypeAttributes: true
  removeStyleLinkTypeAttributes: true
  minifyJS: false
  minifyCSS: false

# CSS 压缩配置
clean_css:
  enable: false
  exclude:
    - '*.min.css'

# JS 压缩配置
uglify:
  enable: false
  exclude:
    - '*.min.js'
