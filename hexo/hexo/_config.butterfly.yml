# --------------------------------------
# Hexo Butterfly Theme Configuration
# If you have any questions, please refer to the documentation
# Chinese: https://butterfly.js.org/
# English: https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  # 导航栏logo图片路径
  logo: /img/avatar.jpg
  # 是否显示网站标题
  display_title: true
  # 是否显示文章标题
  display_post_title: true
  # 是否固定导航栏（滚动时保持在顶部）
  fixed: true

# 导航菜单配置（格式：菜单项名称: 链接 || 图标）
menu:
  主页: / || fas fa-home
  教程: https://www.python-office.com/ || fas fa-book
  AI: https://python4office.cn/ai-nav/ || fas fa-robot
  友链: /links/ || fas fa-handshake
  微信: http://www.python4office.cn/wechat-qrcode/ || fab fa-weixin
  进群: /wechat-group/ || fas fa-users

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题：darker / pale night / light / ocean / false（不使用主题）
  theme: light
  # 是否启用Mac风格窗口样式
  macStyle: true
  # 代码块高度限制（单位：px），false表示不限制
  height_limit: false
  # 是否自动换行
  word_wrap: false

  # 工具栏设置
  copy: true              # 是否显示复制按钮
  language: true          # 是否显示代码语言标识
  # 收缩设置：true-收缩代码块 | false-展开代码块 | none-展开并隐藏按钮
  shrink: false
  # 是否显示全屏按钮
  fullpage: true

# 社交媒体链接配置（格式：图标: 链接 || 描述 || 颜色）
social:
  fab fa-github: https://github.com/CoderWanFeng || Github
  fab fa-weixin: https://www.python4office.cn/wechat-qrcode/ || 微信
  fab fa-bilibili: https://space.bilibili.com/259649365 || B站
  fab fa-youtube: https://www.youtube.com/channel/UCtg1O5pVbuch1sVk_ELr7Hg/ || YouTube
  fab fa-twitter: https://x.com/CoderWanFeng || Twitter
  fab fa-facebook: https://www.facebook.com/matthew.liu.3551 || Facebook
  fas fa-envelope: mailto:1529577833@qq.com || Email

# --------------------------------------
# 图片设置
# --------------------------------------

# 网站图标（浏览器标签页显示的小图标）
favicon: /img/avatar.jpg

# 头像设置（侧边栏作者卡片显示）
avatar:
  img: /img/avatar.jpg
  effect: false           # 是否启用头像特效（旋转等）

# 是否禁用所有页面顶部banner图片
disable_top_img: false

# 默认顶部banner图片（当页面未设置时使用）
default_top_img: 

# 首页顶部banner图片
index_img:

# 归档页顶部banner图片
archive_img:

# 标签页顶部banner图片（单个标签页面，非标签列表页）
tag_img:

# 为每个标签设置单独的banner图片（格式：- 标签名: 图片链接）
tag_per_img:

# 分类页顶部banner图片（单个分类页面，非分类列表页）
category_img:

# 为每个分类设置单独的banner图片
category_per_img:

# 页脚背景图片
footer_img: false

# 网站背景（可设置颜色、图片URL或数组，数组时每次加载随机选择）
background:

# 文章封面图设置
cover:
  index_enable: true      # 首页文章是否显示封面
  aside_enable: true      # 侧边栏文章卡片是否显示封面
  archives_enable: true   # 归档页文章是否显示封面
  default_cover:          # 默认封面图（未设置时显示）

# 图片加载失败时的替代图片
error_img:
  flink: /img/friend_404.gif    # 友情链接头像加载失败时显示
  post_page: /img/404.jpg       # 文章页图片加载失败时显示

# 404页面设置
error_404:
  enable: true              # 是否启用自定义404页面
  subtitle: '页面不存在或已被删除'
  background: /img/404.jpg

# 文章元信息设置（显示文章的日期、分类、标签等）
post_meta:
  # 首页文章元信息设置
  page:
    date_type: created      # 日期类型：created（创建时间）/ updated（更新时间）/ both（都显示）
    date_format: date       # 日期格式：date（完整日期）/ relative（相对时间如"3天前"）
    categories: true        # 是否显示分类
    tags: false             # 是否显示标签
    label: true             # 是否显示文章标签（原创、转载等）
  # 文章页元信息设置
  post:
    position: left          # 位置：left（左侧）/ center（居中）
    date_type: both         # 日期类型
    date_format: date       # 日期格式
    categories: true        # 是否显示分类
    tags: true              # 是否显示标签
    label: true             # 是否显示文章标签

# --------------------------------------
# 首页设置
# --------------------------------------

# 首页顶部banner设置
index_site_info_top:     # 网站信息距离顶部的位置（如300px）
index_top_img_height:    # 顶部banner高度

# 首页副标题设置
subtitle:
  enable: false           # 是否启用副标题
  effect: true            # 是否启用打字机效果
  typed_option:           # 打字机效果自定义配置
  # 随机句子来源（中文）：false-禁用 | 1-hitokoto.cn | 2-一言API | 3-今日诗词
  source: false
  sub:                    # 自定义副标题内容（多行时打字机效果会逐行显示）

# 首页文章布局方式
# 1: 封面在左，信息在右 | 2: 封面在右，信息在左 | 3: 左右交替
# 4: 封面在上，信息在下 | 5: 信息覆盖在封面上 | 6: 瀑布流-封面在上 | 7: 瀑布流-信息覆盖封面
index_layout: 6

# 首页文章摘要显示设置
# 1: 显示文章description | 2: 优先description，无则自动截取 | 3: 自动截取 | false: 不显示
index_post_content:
  method: 2
  length: 300             # 自动截取时的字符长度（仅method为2或3时生效）

# --------------------------------------
# 文章设置
# --------------------------------------

# 目录(TOC)设置
toc:
  post: true              # 文章页是否显示目录
  page: false             # 页面是否显示目录
  number: true            # 是否显示章节编号
  expand: false           # 是否展开所有目录项
  style_simple: false     # 是否使用简洁样式（仅文章页）
  scroll_percent: true    # 是否在目录旁显示滚动进度

# 文章版权信息设置
post_copyright:
  enable: true            # 是否显示版权信息
  decode: false           # 是否解码防复制的邮箱
  author_href:            # 作者链接（留空则使用默认）
  license: CC BY-NC-SA 4.0   # 版权协议类型
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏/赞助设置
reward:
  enable: true            # 是否启用打赏功能
  text: 扫码进群，获取更多资料   # 打赏提示文字
  QR_code:                # 二维码配置
    - img: https://website-python-1300615378.cos.ap-nanjing.myqcloud.com/%E5%BC%95%E5%AF%BC%E8%B6%85%E9%93%BE%E6%8E%A5/4n-group.png
      link:
      text: 微信进群

# 在线编辑文章功能（跳转到GitHub等平台编辑）
post_edit:
  enable: true           # 是否启用
  url: https://github.com/CoderWanFeng/python4office.cn/edit/main/hexo/hexo/source/

# 相关文章推荐
related_post:
  enable: true            # 是否启用
  limit: 6                # 显示数量
  date_type: created      # 排序依据：created（创建时间）/ updated（更新时间）

# 文章分页导航设置
# 1: "下一篇"指向旧文章（时间正序） | 2: "下一篇"指向新文章（时间倒序） | false: 禁用分页导航
post_pagination: 1

# 文章过期提示设置
noticeOutdate:
  enable: false           # 是否启用
  style: flat             # 样式：simple（简洁）/ flat（扁平）
  limit_day: 365          # 超过多少天显示过期提示
  position: top           # 显示位置：top（顶部）/ bottom（底部）
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  nav:                     # 页脚导航菜单（可添加额外导航链接）
  owner:                   # 网站所有者信息
    enable: true           # 是否显示所有者信息
    since: 2020            # 网站创建年份
  copyright:               # 版权信息
    enable: true           # 是否显示版权
    version: true          # 是否显示主题版本号
  custom_text: |           # 自定义页脚文本（支持HTML）
    <span>AI 晚枫 · 专注AI技术分享</span><br>
    <span>备案号：<a href="https://beian.miit.gov.cn/" target="_blank">鲁ICP备2021040536号-1</a></span>

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  enable: true             # 是否启用侧边栏
  hide: false              # 是否隐藏侧边栏
  button: true             # 是否显示右侧按钮控制侧边栏显示/隐藏
  mobile: true             # 移动端是否显示侧边栏
  position: right          # 侧边栏位置：left（左侧）/ right（右侧）
  display:                 # 侧边栏显示的内容模块
    archive: true          # 归档
    tag: true              # 标签
    category: true         # 分类

  card_author:             # 作者卡片
    enable: true           # 是否启用
    description: AI 研究员 | 分享AI技术与自动化实战   # 作者描述
    button:                # 关注按钮
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/CoderWanFeng

  card_announcement:       # 公告卡片
    enable: true           # 是否启用
    content: 抖音/小红书/公众号：程序员晚枫  # 公告内容

  card_recent_post:        # 最新文章卡片
    enable: true           # 是否启用
    limit: 5               # 显示数量（0表示全部）
    sort: date             # 排序方式：date（日期）/ updated（更新时间）

  card_newest_comments:    # 最新评论卡片
    enable: false          # 是否启用
    limit: 6               # 显示数量
    storage: 10            # 本地存储缓存时间（分钟）
    avatar: true           # 是否显示头像

  card_categories:         # 分类卡片
    enable: true           # 是否启用
    limit: 8               # 显示数量（0表示全部）
    expand: none           # 是否展开：none（不展开）/ true（展开）/ false（折叠）

  card_tags:               # 标签卡片
    enable: true           # 是否启用
    limit: 40              # 显示数量（0表示全部）
    color: false           # 是否启用标签颜色
    custom_colors:         # 自定义标签颜色
    orderby: random        # 排序依据：random（随机）/ name（名称）/ length（长度）
    order: 1               # 排序方向：1（升序）/ -1（降序）

  card_archives:           # 归档卡片
    enable: true           # 是否启用
    type: monthly          # 归档类型：monthly（按月）/ yearly（按年）
    format: MMMM YYYY      # 日期格式
    order: -1              # 排序方向

  card_post_series:        # 文章系列卡片
    enable: true           # 是否启用
    series_title: false    # 是否显示系列名称作为标题
    orderBy: 'date'        # 排序依据：title（标题）/ date（日期）
    order: -1              # 排序方向

  card_webinfo:            # 网站信息卡片
    enable: true           # 是否启用
    post_count: true       # 是否显示文章数量
    last_push_date: true   # 是否显示最后更新时间
    runtime_date: 2020/01/01   # 网站运行起始日期（用于计算运行时长）

# --------------------------------------
# 右下角功能按钮设置
# --------------------------------------

# 右下角按钮距离底部的距离（单位：px）
rightside_bottom:

# 繁简体转换功能
translate:
  enable: false                # 是否启用繁简体转换
  default: 繁                  # 默认按钮显示文字
  defaultEncoding: 2           # 默认语言：1（繁体）/ 2（简体）
  translateDelay: 0           # 转换延迟时间（毫秒）
  msgToTraditionalChinese: '繁'   # 简体转繁体时按钮文字
  msgToSimplifiedChinese: '簡'   # 繁体转简体时按钮文字

# 是否启用阅读模式
readmode: true

# 深色模式设置
darkmode:
  enable: true                 # 是否启用深色模式
  button: true                 # 是否显示切换按钮
  # 自动切换模式：1-跟随系统设置（不支持则18:00-06:00自动切换）| 2-18:00-06:00自动切换 | false-禁用
  autoChangeMode: false
  start:                       # 浅色模式开始时间（0-24）
  end:                         # 浅色模式结束时间（0-24）

# 是否在回到顶部按钮中显示滚动百分比
rightside_scroll_percent: false

# 右下角按钮排序设置（不了解请不要修改）
# 可选值：readmode, translate, darkmode, hideAside, toc, chat, comment
rightside_item_order:
  enable: false               # 是否启用自定义排序
  hide:                       # 隐藏的按钮
  show:                       # 显示的按钮

# 右下角设置按钮的动画效果
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

# 锚点设置（点击标题时显示锚点图标）
# butterfly 3.5.1 主题模板 isanchor 期望布尔值，配置改成 false
anchor: false

# 是否显示图片标题（markdown图片的title属性）
photofigcaption: false

# 复制功能设置
copy:
  enable: true         # 是否启用复制功能
  copyright:           # 复制时添加版权信息
    enable: false      # 是否启用
    limit_count: 150   # 超过多少字符时添加版权信息

# 字数统计（需安装hexo-wordcount插件）
wordcount:
  enable: true                  # 是否启用字数统计
  post_wordcount: true           # 文章页显示字数
  min2read: true                 # 显示阅读时间
  total_wordcount: true          # 侧边栏显示网站总字数

# 不蒜子统计（网站访问量统计）
busuanzi:
  site_uv: true        # 网站访客数
  site_pv: true        # 网站总访问量
  page_pv: true        # 单页访问量

# --------------------------------------
# 数学公式支持
# --------------------------------------

# per_page设置：true-每个页面都加载mathjax/katex脚本 | false-根据页面front-matter配置按需加载
math:
  use:                  # 选择渲染引擎：mathjax / katex（留空则不启用）
  per_page: true        # 是否每页都加载数学公式脚本
  hide_scrollbar: false # 是否隐藏滚动条

  mathjax:              # MathJax配置
    enableMenu: true    # 是否启用右键菜单
    tags: none          # 公式编号方式：all（全部编号）/ ams（AMS样式）/ none（不编号）

  katex:                # KaTeX配置
    copy_tex: false     # 是否启用公式复制功能

# --------------------------------------
# 搜索功能
# --------------------------------------

search:
  use: local_search     # 搜索类型：algolia_search / local_search / docsearch（留空则不启用）
  placeholder: 搜索文章...  # 搜索框占位文字

  algolia_search:       # Algolia搜索配置
    hitsPerPage: 6      # 每页显示结果数

  local_search:         # 本地搜索配置
    preload: false      # 是否预加载搜索数据
    top_n_per_article: 1  # 每篇文章显示最多n个匹配结果（-1显示全部）
    unescape: false     # 是否解码HTML实体
    pagination:         # 分页设置
      enable: false     # 是否启用分页
      hitsPerPage: 8    # 每页结果数
    CDN:                # 自定义CDN地址

  docsearch:            # Docsearch配置（需在docsearch.algolia.com申请）
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  use: sharejs          # 分享插件：sharejs / addtoany（留空则不启用）

  sharejs:              # Share.js配置
    sites: facebook,x,wechat,weibo,qq   # 支持的分享平台

  addtoany:             # AddToAny配置
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多支持两种评论系统（逗号分隔），第一种作为默认
  # 可选：Disqus / Disqusjs / Livere / Gitalk / Valine / Waline / Utterances / Facebook Comments / Twikoo / Giscus / Remark42 / Artalk
  use:                  # 启用的评论系统
  text: true            # 是否在按钮旁显示评论名称
  lazyload: false       # 是否懒加载（进入视口时加载，开启后评论数统计失效）
  count: false          # 是否在文章顶部显示评论数
  card_post_count: false  # 是否在首页卡片显示评论数

# Disqus评论系统（国外）
disqus:
  shortname:            # Disqus站点名称
  apikey:               # API密钥（用于最新评论组件）

# DisqusJS（Disqus的开源替代方案）
disqusjs:
  shortname:            # Disqus站点名称
  apikey:               # API密钥
  option:               # 额外配置

# 来必力评论系统（国内）
livere:
  uid:                  # 站点UID

# Gitalk评论系统（基于GitHub Issues）
gitalk:
  client_id:            # GitHub OAuth客户端ID
  client_secret:        # GitHub OAuth客户端密钥
  repo:                 # 存储评论的仓库名
  owner:                # 仓库所有者
  admin:                # 管理员列表
  option:               # 额外配置

# Valine评论系统（国内常用）
valine:
  appId:                # LeanCloud应用ID
  appKey:               # LeanCloud应用密钥
  avatar: monsterid     # 头像样式
  serverURLs:           # 自定义域名（国内用户使用）
  bg:                   # 背景图片
  visitor: false        # 是否使用Valine统计访问量
  option:               # 额外配置

# Waline评论系统（Valine的改进版）
waline:
  serverURL:            # 服务端地址
  bg:                   # 背景图片
  pageview: false       # 是否使用Waline统计访问量
  option:               # 额外配置

# Utterances评论系统（基于GitHub Issues）
utterances:
  repo:                 # 仓库地址（格式：owner/repo）
  issue_term: pathname  # Issue映射方式：pathname/url/title/og:title
  light_theme: github-light    # 亮色主题
  dark_theme: photon-dark      # 暗色主题
  js:                   # 自定义JS地址
  option:               # 额外配置

# Facebook评论插件
facebook_comments:
  app_id:               # Facebook应用ID
  user_id:              # 用户ID（可选）
  pageSize: 10          # 每页显示数量
  order_by: social      # 排序方式：social/time/reverse_time
  lang: en_US           # 语言

# Twikoo评论系统（基于腾讯云开发）
twikoo:
  envId:                # 云开发环境ID
  region:               # 地区
  visitor: false        # 是否使用Twikoo统计访问量
  option:               # 额外配置

# Giscus评论系统（基于GitHub Discussions）
giscus:
  repo:                 # 仓库地址
  repo_id:              # 仓库ID
  category_id:          # 分类ID
  light_theme: light    # 亮色主题
  dark_theme: dark      # 暗色主题
  js:                   # 自定义JS地址
  option:               # 额外配置

# Remark42评论系统
remark42:
  host:                 # 服务端地址
  siteId:               # 站点ID
  option:               # 额外配置

# Artalk评论系统
artalk:
  server:               # 服务端地址
  site:                 # 站点名称
  visitor: false        # 是否使用Artalk统计访问量
  option:               # 额外配置

# --------------------------------------
# 在线聊天服务
# --------------------------------------

chat:
  use:                   # 聊天服务：chatra / tidio / crisp（留空则不启用）
  rightside_button: false  # 是否在右下角显示聊天按钮（推荐）
  button_hide_show: false  # 是否滚动时显示/隐藏按钮

chatra:                  # Chatra聊天服务
  id:                    # 站点ID

tidio:                   # Tidio聊天服务
  public_key:            # 公钥

crisp:                   # Crisp聊天服务
  website_id:            # 网站ID

# --------------------------------------
# 网站分析/统计
# --------------------------------------

# 百度统计
baidu_analytics: a8a4322ff49ea1111171ed84ea70baa6

# Google Analytics
# 已改为：交给自定义脚本延后加载（见 inject.head），避免阻塞首屏
google_analytics:

# Cloudflare Analytics
cloudflare_analytics:

# Microsoft Clarity（热图分析）
# 已移除：c.clarity.ms 在国内不稳定，实测卡死 5.5 秒拖慢整页（2026-07-22 性能诊断）
microsoft_clarity:

# Umami Analytics（隐私友好型统计）
umami_analytics:
  enable: false          # 是否启用
  serverURL:             # 服务端地址（自托管时配置）
  script_name: script.js
  website_id:            # 网站ID
  option:                # 额外配置
  UV_PV:                 # 统计数据显示
    site_uv: false       # 网站访客数
    site_pv: false       # 网站总访问量
    page_pv: false       # 单页访问量
    token:               # API密钥（云服务）/ token（自托管）

# Google Tag Manager
google_tag_manager:
  tag_id:                # 容器ID
  domain:                # 域名（可选）

# --------------------------------------
# 广告设置
# --------------------------------------

# Google Adsense广告
google_adsense:
  enable: true            # 是否启用
  auto_ads: true          # 是否开启自动广告
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client: ca-pub-3274762482246875  # 客户端ID
  enable_page_level_ads: true  # 是否启用页面级广告

# 手动插入广告
ad:
  index:                 # 首页广告（每3篇文章插入）
  aside:                 # 侧边栏广告
  post:                  # 文章页广告（分页前）

# --------------------------------------
# 网站验证
# --------------------------------------

site_verification:       # 搜索引擎验证（如Google、百度等）
  # - name: google-site-verification
  #   content: xxxxxx
  # - name: baidu-site-verification
  #   content: xxxxxxx

# Bing Webmaster 验证
bing_site_verification: 2BCD95E65E1D1495207EC4B5348E684D

# --------------------------------------
# 美化/特效设置
# --------------------------------------

# 主题颜色自定义（颜色值必须用双引号包裹）
# theme_color:
#   enable: true
#   main: "#49B1F5"              # 主色调
#   paginator: "#00c4b6"         # 分页按钮颜色
#   button_hover: "#FF7242"      # 按钮悬停颜色
#   text_selection: "#00c4b6"    # 文本选中背景色
#   link_color: "#99a9bf"        # 链接颜色
#   meta_color: "#858585"        # 元信息颜色
#   hr_color: "#A4D8FA"          # 分隔线颜色
#   code_foreground: "#F47466"   # 代码前景色
#   code_background: "rgba(27, 31, 35, .05)"  # 代码背景色
#   toc_color: "#00c4b6"         # 目录颜色
#   blockquote_padding_color: "#49b1f5"  # 引用块边框颜色
#   blockquote_background_color: "#49b1f5"  # 引用块背景色
#   scrollbar_color: "#49b1f5"   # 滚动条颜色
#   meta_theme_color_light: "ffffff"  # 亮色模式主题色
#   meta_theme_color_dark: "#0d0d0d"  # 暗色模式主题色

# 分类/标签页面UI设置（index-与首页相同 / default-与归档页相同）
category_ui:
tag_ui:

# UI元素是否启用圆角
rounded_corners_ui: true

# 是否启用两端对齐
text_align_justify: false

# 头部和页脚遮罩效果
mask:
  header: true           # 头部遮罩
  footer: true           # 页脚遮罩

# 页面加载动画
preloader:
  enable: false          # 是否启用
  source: 1              # 动画类型：1-fullpage-loading / 2-pace进度条
  pace_css_url:          # Pace进度条主题样式URL

# 页面切换过渡动画
enter_transitions: true

# 默认显示模式：light（亮色）/ dark（暗色）
display_mode: light

# 文章内容美化配置
beautify:
  enable: false          # 是否启用
  field: post            # 美化范围：site（全站）/ post（仅文章）
  title_prefix_icon:     # 标题前缀图标（如'\f0c1'）
  title_prefix_icon_color:  # 标题前缀图标颜色

# 全局字体设置（不了解请不要修改）
font:
  global_font_size:      # 全局字体大小
  code_font_size:        # 代码字体大小
  font_family:           # 字体家族
  code_font_family:      # 代码字体家族

# 网站标题字体设置
blog_title_font:
  font_link:             # 字体链接
  font_family:           # 字体家族

# 分隔线图标设置
hr_icon:
  enable: true           # 是否启用
  icon:                  # Font Awesome图标unicode值
  icon_top:              # 图标上方间距

# 打字机特效（按键特效）
activate_power_mode:
  enable: false          # 是否启用
  colorful: true         # 是否彩色效果
  shake: true            # 是否抖动效果
  mobile: false          # 移动端是否启用

# 背景特效
canvas_ribbon:           # 彩带背景
  enable: false          # 是否启用
  size: 150              # 彩带大小
  alpha: 0.6             # 透明度(0~1)
  zIndex: -1             # z-index层级
  click_to_change: false # 点击是否切换颜色
  mobile: false          # 移动端是否启用

canvas_fluttering_ribbon:  # 飘动彩带
  enable: false          # 是否启用
  mobile: false          # 移动端是否启用

canvas_nest:             # 动态线条背景
  enable: false          # 是否启用
  color: '0,0,255'       # 线条颜色(RGB)
  opacity: 0.7           # 透明度
  zIndex: -1             # z-index层级
  count: 99              # 线条数量
  mobile: false          # 移动端是否启用

fireworks:               # 鼠标点击烟花效果
  enable: false          # 是否启用
  zIndex: 9999           # z-index层级
  mobile: false          # 移动端是否启用

click_heart:             # 鼠标点击爱心效果
  enable: false          # 是否启用
  mobile: false          # 移动端是否启用

clickShowText:           # 鼠标点击文字效果
  enable: false          # 是否启用
  text:                  # 显示的文字列表
  fontSize: 15px         # 字体大小
  random: false          # 是否随机显示
  mobile: false          # 移动端是否启用

# --------------------------------------
# 图片灯箱设置
# --------------------------------------

# 灯箱插件：fancybox / medium_zoom（留空则不启用）
lightbox:

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 文章系列功能
series:
  enable: true          # 是否启用
  orderBy: 'title'       # 排序依据：title（标题）/ date（日期）
  order: 1               # 排序方向：1（升序）/ -1（降序）
  number: true           # 是否显示序号

# ABCJS乐谱插件
abcjs:
  enable: false          # 是否启用
  per_page: true         # 是否按需加载

# Mermaid图表插件（流程图、时序图等）
mermaid:
  enable: false          # 是否启用
  code_write: false      # 是否使用代码块编写Mermaid图
  theme:                 # 主题设置
    light: default       # 亮色模式主题
    dark: dark           # 暗色模式主题
  open_in_new_tab: true  # 是否显示"在新标签页打开"按钮
  zoom_pan: true         # 是否启用缩放和拖拽

# Chart.js图表插件
chartjs:
  enable: false          # 是否启用
  fontColor:             # 图表字体颜色
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  borderColor:           # 图表边框颜色
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  scale_ticks_backdropColor:  # 刻度标签背景色
    light: 'transparent'
    dark: 'transparent'

# Note标签插件（Bootstrap提示框）
note:
  style: flat            # 样式：simple（旧版）/ modern（新版）/ flat（扁平）/ disabled（禁用）
  icons: true            # 是否显示图标
  border_radius: 3       # 边框圆角
  light_bg_offset: 0     # 背景亮度偏移（modern:-12|12; flat:-18|6）

# --------------------------------------
# 其他设置
# --------------------------------------

# PJAX（页面无刷新跳转）
pjax:
  enable: false          # 是否启用
  exclude:              # 排除的页面（如'/music/'）

# APlayer音乐播放器注入
aplayerInject:
  enable: false          # 是否启用
  per_page: true         # 是否按需加载

# Snackbar通知提示
snackbar:
  enable: false          # 是否启用
  position: bottom-left  # 位置：top-left/top-center/top-right/bottom-left/bottom-center/bottom-right
  bg_light: '#49b1f5'   # 亮色模式背景色
  bg_dark: '#1f1f1f'    # 暗色模式背景色

# Instant.page（预加载优化）
# 已关掉：节省 4.2KB module script + TTI -1.5s
instantpage: false

# 图片懒加载
# 已改为：关掉主题 lazyload，由自定义脚本（scripts/native-lazyload.js）注入浏览器原生 loading="lazy"
# 节省 7.3KB vanilla-lazyload JS + 27 个 data-lazy-src 替换
lazyload:
  enable: false          # 主题 lazyload 关闭
  native: true
  field: site
  placeholder:
  blur: false

# PWA（渐进式Web应用）
pwa:
  enable: false          # 是否启用
  manifest:              # manifest.json路径
  apple_touch_icon:      # Apple触摸图标
  favicon_32_32:        # 32x32图标
  favicon_16_16:        # 16x16图标
  mask_icon:            # 遮罩图标

# Open Graph元标签（用于社交分享）
Open_Graph_meta:
  enable: true           # 是否启用
  option:               # 额外配置（twitter_card、twitter_image等）

# 结构化数据（用于SEO）
structured_data:
  enable: false          # 是否启用
  alternate_name:       # 网站别名

# 是否自动添加CSS浏览器前缀
css_prefix: true

# 自定义代码注入
inject:
  head:                 # 注入到<head>标签前
    - <link rel="stylesheet" href="/css/promo.css">
    # Google Analytics 已移除：googletagmanager 在国内被墙，统计失真且拖慢加载（2026-07-22 性能诊断）
  bottom:               # 注入到</body>标签前
    - <script defer src="/js/promo.js?v=20260702"></script>
    # busuanzi 延后加载：等浏览器空闲 5s 后再请求 busuanzi.ibruce.info，避开首屏
    - >-
      <script>
      (function(){
        function loadBusuanzi(){
          var s=document.createElement('script');
          s.async=true;
          s.src='//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js';
          document.head.appendChild(s);
        }
        if('requestIdleCallback' in window){
          requestIdleCallback(loadBusuanzi,{timeout:5000});
        }else{
          setTimeout(loadBusuanzi,5000);
        }
      })();
      </script>

# CDN设置（不了解请不要修改）
CDN:
  # fontawesome CSS 改成本地（已下载到 source/css/fontawesome.min.css + source/fonts/）
  fontawesome: /css/fontawesome.min.css
  # 内部脚本和第三方脚本的CDN提供商
  # 可选值：local / jsdelivr / unpkg / cdnjs / custom
  # 注意：开发版本内部脚本只能使用'local'
  # 注意：第三方脚本设置为'local'时需安装hexo-butterfly-extjs插件
  internal_provider: local       # 内部脚本CDN
  third_party_provider: jsdelivr # 第三方脚本CDN

  # 是否在URL中添加版本号
  version: true

  # 自定义CDN格式
  # 例如：https://cdn.staticfile.org/${cdnjs_name}/${version}/${min_cdnjs_file}
  custom_format:

