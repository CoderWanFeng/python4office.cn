{{ define "main" }}
<section class="taxonomy-section">
    <h1>标签：{{ .Title }}</h1>
    <div class="post-list">
        {{ range .Paginator.Pages }}
        <article class="post-card">
            <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
            <div class="post-meta">
                <span>{{ .Date.Format "2006-01-02" }}</span>
            </div>
            <div class="post-excerpt">
                {{ if .Description }}
                {{ .Description }}
                {{ else }}
                {{ .Summary }}
                {{ end }}
            </div>
        </article>
        {{ end }}
    </div>
</section>
{{ end }}
